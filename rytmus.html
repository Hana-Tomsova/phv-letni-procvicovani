<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rytmické takty</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f3eb;
      --panel: #ffffff;
      --ink: #171717;
      --line: #d9d4ca;
      --good: #197a3a;
      --try: #a92525;
      --shadow: 0 18px 45px rgba(26, 24, 20, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.15)),
        var(--paper);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    main {
      width: min(1120px, 100%);
      display: grid;
      gap: 18px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .scoreboard {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .score {
      min-width: 156px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 12px 16px;
      background: var(--panel);
      font-size: 1.25rem;
      font-weight: 800;
      text-align: center;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      min-width: 300px;
    }

    .reset {
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--ink);
      color: #ffffff;
      min-height: 58px;
      padding: 0 24px;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
    }

    .board {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(14px, 3vw, 28px);
      display: grid;
      gap: 18px;
    }

    .staff-wrap {
      width: 100%;
      min-height: 330px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #fffdfa;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    svg {
      width: min(930px, 100%);
      height: auto;
      display: block;
      touch-action: manipulation;
    }

    .message {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-size: clamp(1.35rem, 3vw, 2.25rem);
      font-weight: 900;
      text-align: center;
    }

    .message.good {
      color: var(--good);
    }

    .message.try {
      color: var(--try);
    }

    .message .mark {
      display: inline-grid;
      place-items: center;
      width: 1.25em;
      height: 1.25em;
      border: 0.12em solid currentColor;
      border-radius: 50%;
      font-size: 0.86em;
      line-height: 1;
      flex: 0 0 auto;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .answer {
      min-height: 104px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      color: #ffffff;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 0 var(--ink);
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
      touch-action: manipulation;
    }

    .answer.good {
      background: var(--good);
    }

    .answer.bad {
      background: var(--try);
    }

    .answer:hover,
    .answer:focus-visible {
      outline: none;
      filter: brightness(1.08);
      transform: translateY(-2px);
      box-shadow: 0 10px 0 var(--ink);
    }

    .answer:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 var(--ink);
    }

    .answer:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      header {
        align-items: stretch;
      }

      .scoreboard {
        width: 100%;
      }

      .score,
      .reset {
        flex: 1;
      }

      .staff-wrap {
        min-height: 260px;
      }

      .answer {
        min-height: 92px;
      }
    }

    @media (max-width: 520px) {
      .answers {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Rytmické takty</h1>
      <div class="scoreboard" aria-live="polite">
        <div class="score stats">
          <span>Správně: <span id="correctScore">0</span></span>
          <span>Špatně: <span id="wrongScore">0</span></span>
        </div>
        <button class="reset" id="reset" type="button">Znovu</button>
      </div>
    </header>

    <section class="board" aria-label="Cvičení rytmu">
      <div class="staff-wrap">
        <svg id="rhythmSvg" viewBox="0 0 930 340" role="img" aria-labelledby="rhythmTitle rhythmDesc">
          <title id="rhythmTitle">Rytmický takt</title>
          <desc id="rhythmDesc">Rozhodni, zda rytmus vyplní takt správně.</desc>
          <g id="measureGuides" stroke="#111111" stroke-linecap="round"></g>

          <g id="timeSignature" fill="#111111" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" text-anchor="middle">
            <text id="topNumber" x="165" y="164">2</text>
            <text x="165" y="224">4</text>
          </g>

          <g id="notes" fill="#111111" stroke="#111111" stroke-width="3.2"></g>
        </svg>
      </div>

      <div class="message" id="message" aria-live="assertive">Je takt správně?</div>

      <div class="answers" aria-label="Odpovědi">
        <button class="answer good" type="button" data-answer="true" aria-label="Takt je správně">✓</button>
        <button class="answer bad" type="button" data-answer="false" aria-label="Takt je špatně">✕</button>
      </div>
    </section>
  </main>

  <script>
    const noteTypes = [
      { name: "whole", beats: 4 },
      { name: "dottedHalf", beats: 3 },
      { name: "half", beats: 2 },
      { name: "quarter", beats: 1 }
    ];

    const correctPatterns = {
      2: [
        ["half"],
        ["quarter", "quarter"]
      ],
      3: [
        ["dottedHalf"],
        ["half", "quarter"],
        ["quarter", "half"],
        ["quarter", "quarter", "quarter"]
      ],
      4: [
        ["whole"],
        ["dottedHalf", "quarter"],
        ["quarter", "dottedHalf"],
        ["half", "half"],
        ["half", "quarter", "quarter"],
        ["quarter", "quarter", "half"],
        ["quarter", "half", "quarter"],
        ["quarter", "quarter", "quarter", "quarter"]
      ]
    };

    const correctScoreEl = document.querySelector("#correctScore");
    const wrongScoreEl = document.querySelector("#wrongScore");
    const messageEl = document.querySelector("#message");
    const rhythmSvg = document.querySelector("#rhythmSvg");
    const measureGuides = document.querySelector("#measureGuides");
    const topNumber = document.querySelector("#topNumber");
    const notesGroup = document.querySelector("#notes");
    const buttons = [...document.querySelectorAll(".answer")];
    const reset = document.querySelector("#reset");

    let currentExercise = null;
    let lastKey = "";
    let correctScore = 0;
    let wrongScore = 0;
    let madeMistakeThisRound = false;
    let loadingNext = false;

    function noteByName(name) {
      return noteTypes.find(note => note.name === name);
    }

    function setMessage(text, type = "", mark = "") {
      messageEl.replaceChildren();
      if (mark) {
        const icon = document.createElement("span");
        icon.className = "mark";
        icon.setAttribute("aria-hidden", "true");
        icon.textContent = mark;
        messageEl.append(icon);
      }
      messageEl.append(document.createTextNode(text));
      messageEl.className = `message ${type}`.trim();
    }

    function makeCorrect(beats) {
      const patterns = correctPatterns[beats];
      const pattern = patterns[Math.floor(Math.random() * patterns.length)];
      return pattern.map(noteByName);
    }

    function makeWrong(beats) {
      const maxNotes = beats === 2 ? 3 : 4;
      let pattern = [];
      let sum = beats;

      while (sum === beats) {
        const count = 1 + Math.floor(Math.random() * maxNotes);
        pattern = Array.from({ length: count }, () => {
          const usable = noteTypes.filter(note => note.beats <= 4);
          return usable[Math.floor(Math.random() * usable.length)];
        });
        sum = pattern.reduce((total, note) => total + note.beats, 0);
      }

      return pattern;
    }

    function drawOpenHead(x, y) {
      return `<ellipse cx="${x}" cy="${y}" rx="24" ry="16.5" transform="rotate(-18 ${x} ${y})" fill="#fffdfa"></ellipse>`;
    }

    function drawFilledHead(x, y) {
      return `<ellipse cx="${x}" cy="${y}" rx="23" ry="16.5" transform="rotate(-18 ${x} ${y})"></ellipse>`;
    }

    function drawStem(x, y) {
      const stemX = x + 20;
      return `<line x1="${stemX}" y1="${y - 4}" x2="${stemX}" y2="${y - 112}" stroke-linecap="round"></line>`;
    }

    function drawNote(note, x) {
      const y = 172;

      if (note.name === "whole") {
        return `<g>${drawOpenHead(x, y)}</g>`;
      }

      if (note.name === "dottedHalf") {
        return `<g>${drawOpenHead(x, y)}${drawStem(x, y)}<circle cx="${x + 48}" cy="${y}" r="5" stroke="none"></circle></g>`;
      }

      if (note.name === "half") {
        return `<g>${drawOpenHead(x, y)}${drawStem(x, y)}</g>`;
      }

      return `<g>${drawFilledHead(x, y)}${drawStem(x, y)}</g>`;
    }

    function drawMeasureGuides(beats) {
      const left = 245;
      const right = 820;
      const top = 88;
      const bottom = 252;
      let lines = [
        `<line x1="${left}" y1="${top}" x2="${left}" y2="${bottom}" stroke-width="4"></line>`,
        `<line x1="${right}" y1="${top}" x2="${right}" y2="${bottom}" stroke-width="4"></line>`
      ];

      measureGuides.innerHTML = lines.join("");
    }

    function drawExercise(exercise) {
      topNumber.textContent = exercise.beats;
      rhythmSvg.dataset.correct = String(exercise.isCorrect);
      rhythmSvg.dataset.beats = String(exercise.beats);
      rhythmSvg.dataset.notes = exercise.notes.map(note => note.name).join(",");
      drawMeasureGuides(exercise.beats);

      const left = 245;
      const right = 820;
      const totalShownBeats = Math.max(
        exercise.beats,
        exercise.notes.reduce((total, note) => total + note.beats, 0)
      );
      const beatWidth = (right - left) / totalShownBeats;
      let cursor = 0;

      notesGroup.innerHTML = exercise.notes.map(note => {
        const x = left + beatWidth * (cursor + note.beats / 2);
        cursor += note.beats;
        return drawNote(note, x);
      }).join("");
    }

    function nextExercise() {
      const beats = [2, 3, 4][Math.floor(Math.random() * 3)];
      const shouldBeCorrect = Math.random() < 0.55;
      const notes = shouldBeCorrect ? makeCorrect(beats) : makeWrong(beats);
      const sum = notes.reduce((total, note) => total + note.beats, 0);
      const key = `${beats}-${notes.map(note => note.name).join("-")}-${sum === beats}`;

      if (key === lastKey) {
        return nextExercise();
      }

      currentExercise = {
        beats,
        notes,
        isCorrect: sum === beats
      };
      lastKey = key;
      drawExercise(currentExercise);
      madeMistakeThisRound = false;
      loadingNext = false;
      buttons.forEach(button => button.disabled = false);
    }

    function choose(answer) {
      if (loadingNext) return;

      const childSaysCorrect = answer === "true";
      if (childSaysCorrect === currentExercise.isCorrect) {
        if (!madeMistakeThisRound) {
          correctScore += 1;
          correctScoreEl.textContent = correctScore;
        }
        setMessage("Správně!", "good", "✓");
        loadingNext = true;
        buttons.forEach(button => button.disabled = true);
        window.setTimeout(() => {
          setMessage("Je takt správně?");
          nextExercise();
        }, 850);
      } else {
        if (!madeMistakeThisRound) {
          wrongScore += 1;
          wrongScoreEl.textContent = wrongScore;
          madeMistakeThisRound = true;
        }
        setMessage("Zkus to znovu", "try", "✕");
      }
    }

    buttons.forEach(button => {
      button.addEventListener("click", () => choose(button.dataset.answer));
    });

    reset.addEventListener("click", () => {
      correctScore = 0;
      wrongScore = 0;
      correctScoreEl.textContent = correctScore;
      wrongScoreEl.textContent = wrongScore;
      setMessage("Je takt správně?");
      nextExercise();
    });

    nextExercise();
  </script>
</body>
</html>
